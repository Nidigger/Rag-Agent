# ChromaDB vector store configuration (legacy / fallback)
collection_name: agent
persist_directory: chroma_db
k: 3

# Data directories
data_path: data
md5_hex_store: md5.text
allow_knowledge_file_type:
  - txt
  - pdf

# Text splitting
chunk_size: 200
chunk_overlap: 20
separators:
  - "\n\n"
  - "\n"
  - "."
  - "!"
  - "?"
  - "\u3002"
  - "\uff01"
  - "\uff1f"
  - " "
  - ""
